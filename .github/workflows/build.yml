  build-old:
    name: Package ${{ matrix.lse }} (mirror)
    needs: check-versions
    strategy:
      matrix: ${{ fromJSON(needs.check-versions.outputs.old_matrix) }}
      fail-fast: false
      max-parallel: 3
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup lip
        shell: pwsh
        run: |
          $latestReleaseUrl = "https://api.github.com/repos/futrime/lip/releases/latest"
          $response = Invoke-RestMethod -Uri $latestReleaseUrl
          $latestVersion = $response.tag_name
          $versionNumber = $latestVersion -replace '^v', ''
          $lipUrl = "https://github.com/futrime/lip/releases/download/$latestVersion/lip-$versionNumber-win-x64.zip"
          curl.exe -L -o lip.zip $lipUrl
          Expand-Archive -Path lip.zip -DestinationPath lip
          $lipPath = Join-Path (Resolve-Path lip) "lip.exe"
          echo "LIP_PATH=$lipPath" >> $env:GITHUB_ENV
          & $lipPath config set go_module_proxy https://goproxy.cn
          & $lipPath config set github_proxy https://github.bibk.top

      - name: Download and extract
        id: extract
        shell: pwsh
        run: |
          $url = "${{ matrix.download_url }}"
          $name = "${{ matrix.asset_name }}"
          Write-Host "Downloading $name"
          curl.exe -L -o "$name" "$url"

          mkdir temp_server
          Expand-Archive -Path "$name" -DestinationPath temp_server

          $bdsVersion = "unknown"
          if (Test-Path "temp_server\.lip") {
            $jsonFiles = Get-ChildItem -Path "temp_server\.lip" -Recurse -Filter "*bds*.json"
            if ($jsonFiles) {
              $bdsJson = $jsonFiles[0].FullName
              Write-Host "Found BDS json: $bdsJson"
              $bdsData = Get-Content $bdsJson | ConvertFrom-Json
              $bdsVersion = $bdsData.version
              if ($bdsData.commands.post_install) {
                $postInstall = $bdsData.commands.post_install[0]
                if ($postInstall -match 'version://[^/]+/([^"]+)') {
                  $bdsVersion = $matches[1]
                  Write-Host "BDS version from command: $bdsVersion"
                }
              }
            }
          }
          Write-Host "BDS version: $bdsVersion"
          echo "bds_version=$bdsVersion" >> $env:GITHUB_OUTPUT

      - name: Determine tag and check existing
        id: check
        shell: pwsh
        run: |
          $bdsVersion = "${{ steps.extract.outputs.bds_version }}"
          if ($bdsVersion -eq "unknown") {
            $tag = "${{ matrix.ll }}-${{ matrix.lse }}" -replace '[^a-zA-Z0-9._-]', '-'
          } else {
            $tag = $bdsVersion
          }
          Write-Host "Tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

          try {
            $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"} -ErrorAction Stop
            Write-Host "Release $tag already exists, skipping"
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } catch {
            Write-Host "Release $tag not found, will create"
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Reinstall BDS with bdsdown
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          cd temp_server
          if (Test-Path ".lip") {
            Remove-Item -Recurse -Force .lip
          }
          $bdsVersion = "${{ steps.extract.outputs.bds_version }}"
          if (Test-Path "bdsdown.exe") {
            .\bdsdown.exe -y --source "version://windows/$bdsVersion"
          }

      - name: Run PeEditor
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          cd temp_server
          if (Test-Path "PeEditor.exe") {
            .\PeEditor.exe -mb
          }

      - name: Remove cache folder
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          if (Test-Path temp_server\.cache) {
            Remove-Item temp_server\.cache -Recurse -Force
          }

      - name: Package into ZIP
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          Compress-Archive -Path temp_server\* -DestinationPath ${{ steps.check.outputs.tag }}.zip

      - name: Create Release and Upload Asset
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          body: |
            BDS ${{ steps.extract.outputs.bds_version }} with LeviLamina ${{ matrix.ll }} and LegacyScriptEngine ${{ matrix.lse }}

            **Installation:** Unzip and run `bedrock_server_mod.exe` to start the server.
          files: ${{ steps.check.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        if: always()
        shell: pwsh
        run: |
          Remove-Item temp_server -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
